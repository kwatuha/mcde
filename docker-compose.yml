services:
  nginx_proxy:
    image: nginx:alpine
    container_name: machakosme_nginx_proxy
    restart: always
    network_mode: host  # Use host network to access localhost:3000 (API) and localhost:5176 (frontend)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    # Note: With host network, ports mapping is not needed
    # Access via http://localhost:80 (or configure nginx to listen on 8084)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: machakosme_react_frontend
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "5178:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: sh -c "cd /app && npm run dev"
    environment:
      # Browser uses nginx :8084; asset URLs in index.html must match (fixes SPA deep links).
      - VITE_DEV_PUBLIC_URL=http://localhost:8084
      # API on host :3002 when api service uses network_mode: host
      - VITE_PROXY_TARGET=http://host.docker.internal:3002

  public-dashboard:
    build:
      context: ./public-dashboard
      dockerfile: Dockerfile
    container_name: machakosme_public_dashboard
    restart: always
    ports:
      - "5179:5173"
    volumes:
      - ./public-dashboard:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    environment:
      - VITE_API_URL=/api
      - VITE_BASE_PATH=/citizen/
      - VITE_DEV_PUBLIC_URL=http://localhost:8084/citizen
      # Set in shell or a repo-root `.env` file (Compose substitutes ${VAR} from the host env / .env).
      - VITE_MAPS_API_KEY=${VITE_MAPS_API_KEY:-}

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: machakosme_node_api
    restart: always
    network_mode: host  # Use host network to access localhost PostgreSQL
    volumes:
      - ./api:/app
      - /app/node_modules
    # DB_* and secrets: use api/.env on the server (loaded by dotenv in api/config/db.js).
    # Not listed as compose env_file so deploy works when api/.env is absent until you create it.
    environment:
      # DB_* come from api/.env above; only NODE_ENV set here so api/.env controls DB connection
      NODE_ENV: development
      PORT: 3002
    command: npm run dev

  # PostgreSQL database (primary)
  # NOTE: For local development, use PostgreSQL installed on your host machine
  # This matches the production setup where PostgreSQL runs on localhost
  # To use Docker PostgreSQL instead, uncomment below and change API network_mode to bridge
  # postgres_db:
  #   image: postgres:16-alpine
  #   container_name: machakosme_postgres
  #   restart: always
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: government_projects
  #   command: >
  #     postgres
  #     -c max_connections=200
  #     -c shared_buffers=256MB
  #     -c tcp_keepalives_idle=600
  #     -c tcp_keepalives_interval=30
  #     -c tcp_keepalives_count=3
  #     -c statement_timeout=30000
  #   volumes:
  #     - machakosme_postgres_data:/var/lib/postgresql/data
  #     - ./scripts/migration/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
  #   ports:
  #     - "5434:5432"
