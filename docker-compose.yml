services:
  nginx_proxy:
    image: nginx:alpine
    container_name: gov_nginx_proxy
    restart: always
    network_mode: host  # Use host network to access localhost:3000 (API) and localhost:5176 (frontend)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    # Note: With host network, ports mapping is not needed
    # Access via http://localhost:80 (or configure nginx to listen on 8081)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: gov_react_frontend
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "5176:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: sh -c "cd /app && npm run dev"
    # Remove VITE_API_URL - let .env.development handle it
    # environment:
    #   VITE_API_URL: /api  # Uses vite.config.js proxy to api:3000

  # public-dashboard service removed - not needed for this application
  # public-dashboard:
  #   build:
  #     context: ./public-dashboard
  #     dockerfile: Dockerfile
  #   container_name: gov_public_dashboard
  #   restart: always
  #   ports:
  #     - "5177:5173"
  #   volumes:
  #     - ./public-dashboard:/app
  #     - /app/node_modules
  #   depends_on:
  #     - api
  #   command: npm run dev
  #   environment:
  #     - VITE_API_URL=/api
  #     - VITE_MAPS_API_KEY=AIzaSyArNdYrq_WsuoGc34C7Osua7kbpt2Twf_s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gov_node_api
    restart: always
    network_mode: host  # Use host network to access localhost PostgreSQL
    volumes:
      - ./api:/app
      - /app/node_modules
    env_file:
      - ./api/.env
    environment:
      # DB_* come from api/.env above; only NODE_ENV set here so api/.env controls DB connection
      NODE_ENV: development
    command: npm run dev

  # PostgreSQL database (primary)
  # NOTE: For local development, use PostgreSQL installed on your host machine
  # This matches the production setup where PostgreSQL runs on localhost
  # To use Docker PostgreSQL instead, uncomment below and change API network_mode to bridge
