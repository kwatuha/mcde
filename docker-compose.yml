version: '3.8'
services:
  nginx_proxy:
    image: nginx:alpine
    container_name: gov_nginx_proxy
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gov_react_frontend
    restart: always
    ports:
      - "5176:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    # Remove VITE_API_URL - let .env.development handle it
    # environment:
    #   VITE_API_URL: /api  # Uses vite.config.js proxy to api:3000

  public-dashboard:
    build:
      context: ./public-dashboard
      dockerfile: Dockerfile
    container_name: gov_public_dashboard
    restart: always
    ports:
      - "5177:5173"
    volumes:
      - ./public-dashboard:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev
    environment:
      - VITE_API_URL=/api
      - VITE_MAPS_API_KEY=AIzaSyArNdYrq_WsuoGc34C7Osua7kbpt2Twf_s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gov_node_api
    restart: always
    ports:
      - "3010:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      # PostgreSQL connection (primary)
      DB_TYPE: postgresql
      # Use service name by default; can be overridden via .env
      DB_HOST: ${DB_HOST:-postgres_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-government_projects}
      DB_PORT: ${DB_PORT:-5432}
      NODE_ENV: development
    command: npm run dev

  # PostgreSQL database (primary)
  postgres_db:
    image: postgres:16-alpine
    container_name: gov_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: government_projects
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c tcp_keepalives_idle=600
      -c tcp_keepalives_interval=30
      -c tcp_keepalives_count=3
      -c statement_timeout=30000
    volumes:
      - gov_postgres_data:/var/lib/postgresql/data
      - ./scripts/migration/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  gov_postgres_data: