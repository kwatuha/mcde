version: '3.8'

# Production Docker Compose Configuration
# This uses optimized production builds

services:
  nginx_proxy:
    image: nginx:alpine
    container_name: gov_nginx_proxy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx-production.conf:/etc/nginx/nginx.conf
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: gov_react_frontend
    restart: unless-stopped
    # No need to expose port externally, nginx will proxy to it
    expose:
      - "80"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gov_node_api
    ports:
      - "3010:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # PostgreSQL connection (primary)
      DB_TYPE: postgresql
      DB_HOST: postgres_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: government_projects
      DB_PORT: 5432
    command: npm run dev
    restart: unless-stopped

  public-dashboard:
    build:
      context: ./public-dashboard
      dockerfile: Dockerfile.production
    container_name: gov_public_dashboard
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "5177:80"

  # PostgreSQL database (primary)
  postgres_db:
    image: postgres:16-alpine
    container_name: gov_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: government_projects
    volumes:
      - gov_postgres_data:/var/lib/postgresql/data
      - ./scripts/migration/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  gov_postgres_data:
  nginx_cache:
