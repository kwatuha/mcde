buildscript {
    ext {
        buildToolsVersion = "33.0.1"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
        // Gradle 8.3 (see gradle-wrapper.properties) ↔ Android Gradle Plugin 8.1.1; change together.
        androidGradlePluginVersion = "8.1.1"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:$androidGradlePluginVersion")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.12.0', 'androidx.core:core-ktx:1.12.0'
            force 'com.facebook.react:react-android:0.73.0'
            eachDependency { details ->
                if (details.requested.group == 'com.facebook.react' && details.requested.name == 'react-native') {
                    details.useTarget("com.facebook.react:react-android:0.73.0")
                    details.because("RN 0.73: use react-android for BaseReactPackage")
                }
            }
        }
    }
    subprojects { sub ->
        sub.afterEvaluate {
            if (sub.name == 'react-native-gesture-handler' || sub.name == 'react-native-screens') {
                sub.dependencies.add('api', 'com.facebook.react:react-android:0.73.0')
            }
        }
    }
}
