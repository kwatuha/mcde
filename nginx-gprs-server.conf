# GPRS Application — system nginx site
# Place at: /etc/nginx/sites-available/gprs  (symlink from sites-enabled/gprs)
# Proxies to Docker gateway on 127.0.0.1:8081
#
# After Certbot adds TLS, keep BOTH listen 80 and listen 443 blocks in sync.
# Do NOT use "return 301 ... /impes/" for location / — SPA is at /; /impes redirects to /.

server {
    listen 80;
    server_name login.gpris.go.ke 102.210.149.119;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 100M;
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    location / {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /impes {
        return 301 /;
    }
    location /impes/ {
        return 301 /;
    }

    location /api {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8081/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8081/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl;
    server_name login.gpris.go.ke;

    ssl_certificate /etc/letsencrypt/live/login.gpris.go.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/login.gpris.go.ke/privkey.pem;
    # Created by Certbot (if missing, comment out and run: sudo certbot --nginx -d login.gpris.go.ke)
    include /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 100M;
    large_client_header_buffers 4 32k;
    client_header_buffer_size 16k;

    location / {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /impes {
        return 301 /;
    }
    location /impes/ {
        return 301 /;
    }

    location /api {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8081/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8081/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
