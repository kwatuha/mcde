# System nginx: TLS termination + reverse proxy to Machakos stack (Docker nginx on host port 8084).
#
# Prerequisites:
#   1. DNS A/AAAA: monitoring.icskenya.co.ke -> this server's public IP
#   2. Machakos Docker stack running (compose nginx listens on 127.0.0.1:8084)
#   3. Ports 80/443 reachable from the internet (firewall)
#
# Install (Debian/Ubuntu example):
#   sudo cp deploy/snippets/nginx-monitoring.icskenya.co.ke.conf /etc/nginx/sites-available/machakos-monitoring.conf
#   sudo ln -sf /etc/nginx/sites-available/machakos-monitoring.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d monitoring.icskenya.co.ke
#   (certbot will add ssl_certificate lines to this file or a companion snippet — follow its prompts)
#
# If certbot is not available, use: sudo certbot certonly --standalone -d monitoring.icskenya.co.ke
# then add the ssl_certificate paths shown in the "HTTPS" server block comments below.

server {
    listen 80;
    listen [::]:80;
    server_name monitoring.icskenya.co.ke;

    client_max_body_size 100M;

    # Optional: ACME HTTP-01 (certbot may manage this automatically with --nginx)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

