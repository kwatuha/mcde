worker_processes auto;
events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Increase buffer sizes for large headers (JWT tokens)
    client_header_buffer_size 16k;
    large_client_header_buffers 8 32k;
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    
    # Additional settings for large headers
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Enable gzip compression (like production)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 8084;  # Shifted above board project's 8083 to avoid local conflicts
        server_name localhost;

        # Legacy /impes URLs: redirect before location / ( ^~ stops further prefix search )
        location = /impes {
            return 301 $scheme://$host/;
        }
        location ^~ /impes/ {
            return 301 $scheme://$host/;
        }

        # Public dashboard under /citizen
        location = /citizen {
            return 301 $scheme://$host/citizen/;
        }
        location ^~ /citizen/ {
            proxy_pass http://127.0.0.1:5179;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Handle Vite dev server resources (HMR, @vite/client, etc.)
        # Frontend is on host network, use localhost
        location ~ ^/(src/|@vite/|@react-refresh|node_modules/|vite\.svg) {
            proxy_pass http://127.0.0.1:5178;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # SPA at domain root (Vite base: /). No URI suffix on proxy_pass so the full path
        # (e.g. /project-by-status-dashboard) is forwarded — required for dev-server HTML fallback.
        # Vite port: 5178 if compose maps 5178:5173; use 5173 if frontend uses Docker host network only.
        location / {
            proxy_pass http://127.0.0.1:5178;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Handle API requests (must match api PORT in docker-compose.yml, default 3002)
        location /api/ {
            # API is on host network, use localhost
            set $api_backend http://127.0.0.1:3002;
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for API calls
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Handle Socket.IO WebSocket connections
        location /socket.io/ {
            # API is on host network, use localhost
            set $api_backend http://127.0.0.1:3002;
            proxy_pass $api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Handle uploads directly
        location /uploads/ {
            # API is on host network, use localhost
            set $api_backend http://127.0.0.1:3002;
            # Preserve incoming URI exactly (/uploads/...) to match Express static mapping.
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            autoindex on;
            
            # Cache uploaded files (images, documents)
            expires 7d;
            add_header Cache-Control "public, immutable";
        }


    }
}