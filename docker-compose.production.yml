# Production docker-compose.yml for IMPES Application
# This file is for production deployments using pre-built images from GitHub Container Registry

services:
  nginx_proxy:
    image: ghcr.io/USERNAME/impes-nginx:latest
    container_name: machakosme_nginx_proxy
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api
    restart: unless-stopped

  frontend:
    image: ghcr.io/USERNAME/impes-frontend:latest
    container_name: machakosme_react_frontend
    ports:
      - "5178:80"
    depends_on:
      - api
    restart: unless-stopped

  public-dashboard:
    image: ghcr.io/USERNAME/impes-public-dashboard:latest
    container_name: machakosme_public_dashboard
    ports:
      - "5179:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: ghcr.io/USERNAME/impes-api:latest
    container_name: machakosme_node_api
    ports:
      - "3011:3000"
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # PostgreSQL connection (primary) - override via .env on the server
      DB_TYPE: postgresql
      DB_HOST: ${DB_HOST:-postgres_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-government_projects}
      DB_PORT: ${DB_PORT:-5432}
    restart: unless-stopped

  # PostgreSQL database (primary)
  postgres_db:
    image: postgres:16-alpine
    container_name: machakosme_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${DB_USER:-postgres}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:-postgres}}
      POSTGRES_DB: ${POSTGRES_DB:-${DB_NAME:-government_projects}}
    volumes:
      - machakosme_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-${DB_USER:-postgres}}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  machakosme_postgres_data:

# Instructions:
# 1. Replace USERNAME with your actual GitHub username
# 2. Copy this file to your production machine
# 3. Run: docker-compose -f docker-compose.production.yml up -d
# 4. Access your app at: http://YOUR-SERVER-IP/impes/
